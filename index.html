<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Icestreams · Ultimate Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #141414;
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0;
        }
        .app-container {
            max-width: 1500px;
            width: 100%;
            background: #141414;
            padding: 0 2.5rem 2.5rem;
        }

        /* ===== HEADER ===== */
        .brand-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem 0.5rem;
            padding: 1.2rem 0 0.8rem;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 1.5rem;
        }
        .logo h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #00b4d8;
            text-shadow: 0 0 30px rgba(0, 180, 216, 0.3);
            display: inline-block;
        }
        .logo span {
            font-weight: 400;
            font-size: 1.1rem;
            color: #90e0ef;
            background: #1a2a3a;
            padding: 0.2rem 1rem;
            border-radius: 4px;
            margin-left: 0.75rem;
            border: 1px solid #2a4a5a;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.75rem;
        }
        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .header-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #888;
            padding: 0.4rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.15s;
            font-family: "Inter", sans-serif;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .header-btn:hover {
            border-color: #00b4d8;
            color: #fff;
        }
        .header-btn.active {
            border-color: #00b4d8;
            color: #00b4d8;
        }
        .header-btn .badge-count {
            background: #00b4d8;
            color: #fff;
            border-radius: 50%;
            padding: 0 0.4rem;
            font-size: 0.6rem;
            min-width: 18px;
            text-align: center;
        }

        /* ===== SEARCH ===== */
        .search-section {
            margin: 0 0 1.5rem 0;
            position: relative;
        }
        .search-container {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
            transition: all 0.3s ease;
            max-width: 500px;
        }
        .search-container:focus-within {
            border-color: #00b4d8;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.15);
        }
        .search-icon {
            color: #666;
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }
        .search-container input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: "Inter", sans-serif;
            font-size: 0.95rem;
            padding: 0.6rem 0;
            flex: 1;
            outline: none;
            min-width: 200px;
        }
        .search-container input::placeholder {
            color: #555;
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-width: 500px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            margin-top: 0.3rem;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }
        .search-results.show {
            display: block;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            cursor: pointer;
            transition: all 0.15s;
            border-bottom: 1px solid #252525;
        }
        .search-result-item:hover {
            background: #2a2a2a;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
        .search-result-thumb {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: #1a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            font-size: 1rem;
            font-weight: 600;
            color: #90e0ef;
            border: 1px solid #2a4a5a;
        }
        .search-result-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            padding: 4px;
            background: #1a1a1a;
        }
        .search-result-info {
            flex: 1;
        }
        .search-result-name {
            color: #e5e5e5;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .search-result-category {
            color: #666;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .search-result-play {
            background: #00b4d8;
            border: none;
            color: #fff;
            padding: 0.2rem 1rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s;
        }
        .search-result-play:hover {
            background: #00d4ff;
            transform: scale(1.05);
        }
        .search-results::-webkit-scrollbar {
            width: 6px;
        }
        .search-results::-webkit-scrollbar-track {
            background: #141414;
        }
        .search-results::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        .search-results::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 0.2rem;
            flex-wrap: wrap;
            margin: 0 0 2rem 0;
            border-bottom: 2px solid #2a2a2a;
            padding-bottom: 0.2rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #808080;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.6rem 1.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
            border-radius: 4px 4px 0 0;
            position: relative;
        }
        .tab-btn:hover {
            color: #e5e5e5;
            background: #1a1a1a;
        }
        .tab-btn.active {
            color: #ffffff;
            background: #1a1a1a;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #00b4d8;
            border-radius: 2px 2px 0 0;
        }
        .tab-btn:focus-visible {
            outline: 2px solid #00b4d8;
            outline-offset: 2px;
        }

        .panel {
            display: none;
            animation: fadePanel 0.25s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fadePanel {
            0% {
                opacity: 0.3;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== CHANNEL GRID ===== */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem 1.5rem;
            margin: 1.5rem 0 1.5rem;
        }

        /* ===== CHANNEL CARD ===== */
        .channel-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
            border: 1px solid #2a2a2a;
            position: relative;
        }
        .channel-card:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            border-color: #404040;
            z-index: 10;
        }

        .channel-card .favorite-star {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: #888;
            font-size: 1.2rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            z-index: 5;
            transition: all 0.15s;
        }
        .channel-card .favorite-star:hover {
            transform: scale(1.2);
        }
        .channel-card .favorite-star.active {
            color: #ffd700;
        }

        .channel-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }
        .channel-thumb {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: #1a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            font-size: 1.4rem;
            font-weight: 600;
            color: #90e0ef;
            border: 1px solid #2a4a5a;
        }
        .channel-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            padding: 4px;
            background: #1a1a1a;
        }
        .channel-name {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.1px;
            color: #e5e5e5;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-preview {
            position: relative;
            background: #0a0a0a;
            padding: 0.6rem;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .channel-preview img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            border-radius: 6px;
            opacity: 0.6;
        }
        .channel-preview .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            transition: all 0.3s;
        }
        .channel-preview .play-overlay:hover {
            background: rgba(0, 0, 0, 0.2);
        }
        .channel-preview .play-overlay .play-icon {
            font-size: 4rem;
            color: #fff;
            opacity: 0.8;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            transition: all 0.3s;
        }
        .channel-card:hover .play-overlay .play-icon {
            transform: scale(1.1);
            opacity: 1;
        }

        .channel-meta {
            padding: 0.6rem 1rem 0.8rem;
            font-size: 0.75rem;
            color: #888;
            background: #161616;
            border-top: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .channel-meta .badge {
            background: #00b4d8;
            padding: 0.15rem 0.8rem;
            border-radius: 4px;
            color: #fff;
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .channel-meta .badge.off {
            background: #444;
            color: #999;
        }
        .channel-meta .views {
            color: #555;
            font-size: 0.6rem;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 12px;
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            animation: slideUp 0.3s ease;
            position: relative;
        }
        @keyframes slideUp {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }
        .modal-header .modal-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .modal-header .modal-title .modal-thumb {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: #1a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 1.2rem;
            border: 1px solid #2a4a5a;
        }
        .modal-header .modal-title .modal-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
        }
        .modal-header .modal-title h2 {
            font-size: 1.2rem;
            color: #e5e5e5;
        }
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0 0.5rem;
            line-height: 1;
        }
        .modal-close:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 1.5rem;
            background: #0a0a0a;
            position: relative;
        }
        .modal-body iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            border-radius: 8px;
            background: #000;
        }
        .modal-body .modal-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #2a2a2a;
            color: #666;
            gap: 0.5rem;
        }
        .modal-body .modal-placeholder .big-icon {
            font-size: 4rem;
            opacity: 0.3;
            color: #00b4d8;
        }

        .modal-footer {
            padding: 0.8rem 1.5rem;
            background: #161616;
            border-top: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .modal-footer .modal-badge {
            background: #00b4d8;
            padding: 0.15rem 0.8rem;
            border-radius: 4px;
            color: #fff;
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .modal-footer .modal-badge.off {
            background: #444;
            color: #999;
        }
        .modal-footer .modal-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .modal-footer .modal-controls button {
            background: #333;
            border: none;
            color: #fff;
            font-family: "Inter", sans-serif;
            font-weight: 600;
            padding: 0.3rem 1.2rem;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid #444;
        }
        .modal-footer .modal-controls button:hover {
            transform: scale(1.05);
        }
        .modal-footer .modal-controls .modal-play-btn {
            background: #00b4d8;
            border-color: #00b4d8;
        }
        .modal-footer .modal-controls .modal-play-btn:hover {
            background: #00d4ff;
            border-color: #00d4ff;
        }
        .modal-footer .modal-controls .modal-play-btn.playing {
            background: #2d8a4e;
            border-color: #2d8a4e;
        }
        .modal-footer .modal-controls .modal-stop-btn {
            background: #444;
            border-color: #555;
        }
        .modal-footer .modal-controls .modal-stop-btn:hover {
            background: #666;
            border-color: #777;
        }
        .modal-footer .modal-controls .modal-stop-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .modal-footer .modal-controls .modal-fav-btn {
            background: #1a1a1a;
            border-color: #333;
        }
        .modal-footer .modal-controls .modal-fav-btn:hover {
            border-color: #ffd700;
        }
        .modal-footer .modal-controls .modal-fav-btn.active {
            color: #ffd700;
            border-color: #ffd700;
        }
        .modal-footer .modal-controls .modal-pip-btn {
            background: #1a1a1a;
            border-color: #333;
        }
        .modal-footer .modal-controls .modal-pip-btn:hover {
            border-color: #00b4d8;
        }

        .channel-count {
            color: #666;
            font-size: 0.8rem;
            margin: 0.5rem 0 0;
        }

        /* ===== FOOTER ===== */
        .ice-footer {
            margin-top: 3rem;
            padding: 1.5rem 0 0.5rem;
            border-top: 1px solid #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem 1.2rem;
        }
        .ice-footer p {
            font-size: 0.85rem;
            font-weight: 400;
            color: #90e0ef;
            letter-spacing: 0.5px;
            background: #1a2a3a;
            padding: 0.3rem 2rem;
            border-radius: 4px;
            border: 1px solid #2a4a5a;
        }
        .ice-footer strong {
            color: #00b4d8;
            font-weight: 700;
        }
        .ice-footer .copyright-symbol {
            color: #90e0ef;
            margin: 0 4px;
        }

        /* ===== KEYBOARD SHORTCUTS HINT ===== */
        .shortcuts-hint {
            color: #444;
            font-size: 0.65rem;
            text-align: center;
            margin: 1rem 0;
            letter-spacing: 0.5px;
        }
        .shortcuts-hint kbd {
            background: #1a1a1a;
            padding: 0.1rem 0.5rem;
            border-radius: 3px;
            border: 1px solid #2a2a2a;
            font-family: inherit;
            font-size: 0.6rem;
            color: #666;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app-container {
                padding: 0 1.2rem 1.5rem;
            }
            .logo h1 {
                font-size: 2.2rem;
            }
            .brand-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-actions {
                width: 100%;
                justify-content: flex-start;
            }
            .search-container {
                max-width: 100%;
            }
            .search-results {
                max-width: 100%;
            }
            .tab-btn {
                font-size: 0.9rem;
                padding: 0.4rem 1.2rem;
            }
            .channel-grid {
                grid-template-columns: 1fr 1fr;
                gap: 1.2rem;
            }
            .modal-content {
                width: 95%;
                max-height: 95vh;
            }
            .modal-body {
                padding: 0.8rem;
            }
        }
        @media (max-width: 500px) {
            .channel-grid {
                grid-template-columns: 1fr;
            }
            .logo h1 {
                font-size: 1.8rem;
            }
            .tab-btn {
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }
            .modal-header {
                padding: 0.8rem 1rem;
            }
            .modal-header .modal-title h2 {
                font-size: 1rem;
            }
            .modal-footer {
                flex-direction: column;
                align-items: stretch;
            }
            .modal-footer .modal-controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">

        <!-- HEADER -->
        <div class="brand-bar">
            <div class="logo">
                <h1>Icestreams</h1>
                <span>Ultimate</span>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="favoritesToggle">⭐ Favorites <span class="badge-count" id="favCount">0</span></button>
                <button class="header-btn" id="historyToggle">🕐 History</button>
                <button class="header-btn" id="clearHistoryBtn" style="display:none;">🗑️ Clear</button>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="search-section">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search channels... (Ctrl+K)" autocomplete="off" />
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- TABS -->
        <div class="tabs" role="tablist">
            <button class="tab-btn active" data-tab="all" role="tab">📺 All</button>
            <button class="tab-btn" data-tab="football" role="tab">⚽ Football</button>
            <button class="tab-btn" data-tab="movies" role="tab">🎬 Movies</button>
            <button class="tab-btn" data-tab="shows" role="tab">📺 Shows</button>
        </div>

        <!-- PANELS -->
        <div id="panel-all" class="panel active" role="tabpanel">
            <div class="channel-grid" id="allGrid"></div>
            <div class="channel-count" id="allCount"></div>
        </div>
        <div id="panel-football" class="panel" role="tabpanel">
            <div class="channel-grid" id="footballGrid"></div>
            <div class="channel-count" id="footballCount"></div>
        </div>
        <div id="panel-movies" class="panel" role="tabpanel">
            <div class="channel-grid" id="moviesGrid"></div>
            <div class="channel-count" id="moviesCount"></div>
        </div>
        <div id="panel-shows" class="panel" role="tabpanel">
            <div class="channel-grid" id="showsGrid"></div>
            <div class="channel-count" id="showsCount"></div>
        </div>

        <!-- SHORTCUTS HINT -->
        <div class="shortcuts-hint">
            <kbd>Ctrl+K</kbd> Search · <kbd>Esc</kbd> Close · <kbd>Space</kbd> Play/Pause · <kbd>F</kbd> Favorite
        </div>

        <!-- FOOTER -->
        <div class="ice-footer">
            <p><span class="copyright-symbol">❄️</span> <strong>icecoldinit</strong> <span style="margin:0 6px;color:#5a7a8a;">©</span> 2026 · all streams embedded</p>
        </div>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <div class="modal-thumb" id="modalThumb">📺</div>
                    <h2 id="modalTitle">Channel Name</h2>
                </div>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="modal-placeholder" id="modalPlaceholder">
                    <div class="big-icon">▶</div>
                    <div>Click play to start streaming</div>
                </div>
                <iframe id="modalIframe" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
            </div>
            <div class="modal-footer">
                <span class="modal-badge off" id="modalBadge">OFF AIR</span>
                <div class="modal-controls">
                    <button class="modal-play-btn" id="modalPlayBtn">▶ Play</button>
                    <button class="modal-stop-btn" id="modalStopBtn" disabled>⏹ Stop</button>
                    <button class="modal-fav-btn" id="modalFavBtn">⭐</button>
                    <button class="modal-pip-btn" id="modalPipBtn">📺 PIP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ===== CHANNEL DATA - ALL CHANNELS RESTORED =====
            const footballChannels = [
                { name: 'Sky Sports Premier League', embed: 'https://logic.icelanders.st/embed/skysportspremierleague-uk', logo: 'https://ui-avatars.com/api/?name=SS&background=00b4d8&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/00b4d8?text=Sky+Sports' },
                { name: 'Sony Sports Network', embed: 'https://logic.icelanders.st/embed/sonysportsnetwork-in', logo: 'https://ui-avatars.com/api/?name=SN&background=1a73e8&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/1a73e8?text=Sony' },
                { name: 'FOX Sports 1', embed: 'https://logic.icelanders.st/embed/fox-sports-1', logo: 'https://ui-avatars.com/api/?name=FS&background=0033a0&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/0033a0?text=FOX' },
                { name: 'ESPN USA', embed: 'https://logic.icelanders.st/embed/espn-usa', logo: 'https://ui-avatars.com/api/?name=ES&background=cc0000&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/cc0000?text=ESPN' }
            ];

            const moviesChannels = [
                { name: 'HBO Max HD', embed: 'https://www.youtube.com/embed/f3f3f3f3f3f?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=HB&background=5822b4&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/5822b4?text=HBO' },
                { name: 'Cineplex 4K', embed: 'https://www.youtube.com/embed/g4g4g4g4g4g?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=CP&background=ff6b00&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/ff6b00?text=Cineplex' },
                { name: 'AMC Theaters', embed: 'https://www.youtube.com/embed/h5h5h5h5h5h?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=AM&background=e50914&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/e50914?text=AMC' },
                { name: 'Netflix Live', embed: 'https://www.youtube.com/embed/i6i6i6i6i6i?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=NL&background=e50914&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/e50914?text=Netflix' },
                { name: 'Disney+ Hits', embed: 'https://www.youtube.com/embed/j7j7j7j7j7j?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=DP&background=113ccf&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/113ccf?text=Disney' },
                { name: 'Paramount+', embed: 'https://www.youtube.com/embed/k8k8k8k8k8k?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=PP&background=0066ff&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/0066ff?text=Paramount' }
            ];

            const showsChannels = [
                { name: 'HBO Series', embed: 'https://www.youtube.com/embed/l9l9l9l9l9l?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=HS&background=5822b4&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/5822b4?text=HBO+Series' },
                { name: 'Apple TV+', embed: 'https://www.youtube.com/embed/m0m0m0m0m0m?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=AT&background=555555&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/555555?text=Apple' },
                { name: 'Prime Originals', embed: 'https://www.youtube.com/embed/n1n1n1n1n1n?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=PO&background=00a8e1&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/00a8e1?text=Prime' },
                { name: 'Hulu Live', embed: 'https://www.youtube.com/embed/o2o2o2o2o2o?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=HL&background=1ce783&color=000&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/1ce783?text=Hulu' },
                { name: 'Peacock TV', embed: 'https://www.youtube.com/embed/p3p3p3p3p3p?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=PT&background=000000&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/000000?text=Peacock' },
                { name: 'BBC iPlayer', embed: 'https://www.youtube.com/embed/q4q4q4q4q4q?autoplay=0&rel=0', logo: 'https://ui-avatars.com/api/?name=BI&background=cc0000&color=fff&size=40&bold=true', thumbnail: 'https://placehold.co/600x400/1a2a3a/cc0000?text=BBC' }
            ];

            // ===== STATE =====
            let currentChannels = {
                football: [...footballChannels],
                movies: [...moviesChannels],
                shows: [...showsChannels]
            };

            let favorites = JSON.parse(localStorage.getItem('icestreams_favorites') || '[]');
            let history = JSON.parse(localStorage.getItem('icestreams_history') || '[]');
            let showingFavorites = false;
            let showingHistory = false;

            // ===== DOM REFS =====
            const allGrid = document.getElementById('allGrid');
            const footballGrid = document.getElementById('footballGrid');
            const moviesGrid = document.getElementById('moviesGrid');
            const showsGrid = document.getElementById('showsGrid');
            const allCount = document.getElementById('allCount');
            const footballCount = document.getElementById('footballCount');
            const moviesCount = document.getElementById('moviesCount');
            const showsCount = document.getElementById('showsCount');
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const favoritesToggle = document.getElementById('favoritesToggle');
            const historyToggle = document.getElementById('historyToggle');
            const clearHistoryBtn = document.getElementById('clearHistoryBtn');
            const favCount = document.getElementById('favCount');

            // Modal elements
            const modalOverlay = document.getElementById('modalOverlay');
            const modalClose = document.getElementById('modalClose');
            const modalTitle = document.getElementById('modalTitle');
            const modalThumb = document.getElementById('modalThumb');
            const modalIframe = document.getElementById('modalIframe');
            const modalPlaceholder = document.getElementById('modalPlaceholder');
            const modalBadge = document.getElementById('modalBadge');
            const modalPlayBtn = document.getElementById('modalPlayBtn');
            const modalStopBtn = document.getElementById('modalStopBtn');
            const modalFavBtn = document.getElementById('modalFavBtn');
            const modalPipBtn = document.getElementById('modalPipBtn');

            let currentModalChannel = null;
            let isModalPlaying = false;

            // ===== HELPERS =====
            function getUniqueId(channel, category) {
                return `${category}-${channel.name}`;
            }

            function isFavorite(channel, category) {
                return favorites.some(f => f.id === getUniqueId(channel, category));
            }

            function toggleFavorite(channel, category) {
                const id = getUniqueId(channel, category);
                const index = favorites.findIndex(f => f.id === id);
                if (index > -1) {
                    favorites.splice(index, 1);
                } else {
                    favorites.push({ id, name: channel.name, category, embed: channel.embed, logo: channel.logo });
                }
                localStorage.setItem('icestreams_favorites', JSON.stringify(favorites));
                updateFavCount();
                renderAll();
                if (modalFavBtn) {
                    modalFavBtn.classList.toggle('active', isFavorite(channel, category));
                }
            }

            function addToHistory(channel, category) {
                const id = getUniqueId(channel, category);
                history = history.filter(h => h.id !== id);
                history.unshift({ id, name: channel.name, category, embed: channel.embed, logo: channel.logo, timestamp: Date.now() });
                if (history.length > 50) history = history.slice(0, 50);
                localStorage.setItem('icestreams_history', JSON.stringify(history));
            }

            function updateFavCount() {
                favCount.textContent = favorites.length;
            }

            // ===== RENDER FUNCTION =====
            function renderChannels(container, channels, countEl, category) {
                if (!container) return;
                container.innerHTML = '';
                
                let displayChannels = channels;
                if (showingFavorites && category !== 'all') {
                    displayChannels = channels.filter(ch => isFavorite(ch, category));
                }

                if (showingHistory && category !== 'all') {
                    const historyIds = history.map(h => h.id);
                    displayChannels = channels.filter(ch => historyIds.includes(getUniqueId(ch, category)));
                    displayChannels.sort((a, b) => {
                        const aIdx = history.findIndex(h => h.id === getUniqueId(a, category));
                        const bIdx = history.findIndex(h => h.id === getUniqueId(b, category));
                        return aIdx - bIdx;
                    });
                }

                if (displayChannels.length === 0) {
                    const msg = showingFavorites ? '⭐ No favorites in this category' : 
                               showingHistory ? '🕐 No history in this category' : 
                               '📡 No channels available';
                    container.innerHTML = `<div class="empty-note">${msg}</div>`;
                    if (countEl) countEl.textContent = '0 channels';
                    return;
                }

                displayChannels.forEach((ch, index) => {
                    const card = document.createElement('div');
                    card.className = 'channel-card';
                    card.dataset.channelName = ch.name.toLowerCase();
                    card.dataset.category = category;
                    card.dataset.index = index;

                    const isFav = isFavorite(ch, category);
                    
                    const starBtn = document.createElement('button');
                    starBtn.className = `favorite-star ${isFav ? 'active' : ''}`;
                    starBtn.innerHTML = isFav ? '⭐' : '☆';
                    starBtn.title = isFav ? 'Remove from favorites' : 'Add to favorites';
                    starBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        toggleFavorite(ch, category);
                        starBtn.innerHTML = isFavorite(ch, category) ? '⭐' : '☆';
                        starBtn.classList.toggle('active');
                    });

                    const header = document.createElement('div');
                    header.className = 'channel-header';

                    const thumbDiv = document.createElement('div');
                    thumbDiv.className = 'channel-thumb';
                    if (ch.logo) {
                        const img = document.createElement('img');
                        img.src = ch.logo;
                        img.alt = ch.name;
                        img.loading = 'lazy';
                        thumbDiv.appendChild(img);
                    } else {
                        thumbDiv.textContent = ch.name.charAt(0).toUpperCase();
                    }

                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'channel-name';
                    nameDiv.textContent = ch.name;

                    header.appendChild(thumbDiv);
                    header.appendChild(nameDiv);

                    const preview = document.createElement('div');
                    preview.className = 'channel-preview';
                    const img = document.createElement('img');
                    img.src = ch.thumbnail || 'https://placehold.co/600x400/1a1a1a/333?text=No+Preview';
                    img.alt = ch.name;
                    img.loading = 'lazy';
                    const overlay = document.createElement('div');
                    overlay.className = 'play-overlay';
                    overlay.innerHTML = `<span class="play-icon">▶</span>`;
                    
                    preview.appendChild(img);
                    preview.appendChild(overlay);

                    const meta = document.createElement('div');
                    meta.className = 'channel-meta';
                    const badge = document.createElement('span');
                    badge.className = 'badge off';
                    badge.textContent = 'OFF AIR';
                    const views = document.createElement('span');
                    views.className = 'views';
                    const historyEntry = history.find(h => h.id === getUniqueId(ch, category));
                    views.textContent = historyEntry ? `🕐 watched` : '';

                    meta.appendChild(badge);
                    meta.appendChild(views);

                    card.addEventListener('click', function() {
                        openModal(category, channels.indexOf(ch));
                    });

                    card.appendChild(starBtn);
                    card.appendChild(header);
                    card.appendChild(preview);
                    card.appendChild(meta);
                    container.appendChild(card);
                });

                if (countEl) {
                    countEl.textContent = `${displayChannels.length} channel${displayChannels.length !== 1 ? 's' : ''}`;
                }
            }

            // ===== RENDER ALL =====
            function renderAll() {
                const allChannels = [...currentChannels.football, ...currentChannels.movies, ...currentChannels.shows];
                renderChannels(allGrid, allChannels, allCount, 'all');
                renderChannels(footballGrid, currentChannels.football, footballCount, 'football');
                renderChannels(moviesGrid, currentChannels.movies, moviesCount, 'movies');
                renderChannels(showsGrid, currentChannels.shows, showsCount, 'shows');
                updateFavCount();
            }

            renderAll();

            // ===== MODAL FUNCTIONS =====
            function openModal(category, index) {
                let channel;
                if (category === 'all') {
                    const allChannels = [...currentChannels.football, ...currentChannels.movies, ...currentChannels.shows];
                    channel = allChannels[index];
                    for (const cat of ['football', 'movies', 'shows']) {
                        if (currentChannels[cat].includes(channel)) {
                            category = cat;
                            break;
                        }
                    }
                } else {
                    channel = currentChannels[category][index];
                }
                if (!channel) return;

                currentModalChannel = { category, index, channel };
                isModalPlaying = false;

                modalTitle.textContent = channel.name;
                modalThumb.innerHTML = channel.logo ? 
                    `<img src="${channel.logo}" alt="${channel.name}" />` : 
                    channel.name.charAt(0).toUpperCase();
                
                modalIframe.src = 'about:blank';
                modalIframe.style.display = 'none';
                modalPlaceholder.style.display = 'flex';
                modalBadge.textContent = 'OFF AIR';
                modalBadge.className = 'modal-badge off';
                modalPlayBtn.textContent = '▶ Play';
                modalPlayBtn.className = 'modal-play-btn';
                modalStopBtn.disabled = true;
                modalFavBtn.classList.toggle('active', isFavorite(channel, category));

                addToHistory(channel, category);
                renderAll();

                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                if (isModalPlaying) stopModalStream();
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
                currentModalChannel = null;
            }

            function playModalStream() {
                if (!currentModalChannel || isModalPlaying) return;
                const { channel } = currentModalChannel;
                isModalPlaying = true;
                modalIframe.src = channel.embed;
                modalIframe.style.display = 'block';
                modalPlaceholder.style.display = 'none';
                modalBadge.textContent = 'LIVE';
                modalBadge.className = 'modal-badge';
                modalPlayBtn.textContent = '● Playing';
                modalPlayBtn.className = 'modal-play-btn playing';
                modalStopBtn.disabled = false;
            }

            function stopModalStream() {
                if (!currentModalChannel || !isModalPlaying) return;
                isModalPlaying = false;
                modalIframe.src = 'about:blank';
                modalIframe.style.display = 'none';
                modalPlaceholder.style.display = 'flex';
                modalBadge.textContent = 'OFF AIR';
                modalBadge.className = 'modal-badge off';
                modalPlayBtn.textContent = '▶ Play';
                modalPlayBtn.className = 'modal-play-btn';
                modalStopBtn.disabled = true;
            }

            // ===== MODAL EVENT LISTENERS =====
            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            modalPlayBtn.addEventListener('click', function() {
                if (isModalPlaying) stopModalStream();
                else playModalStream();
            });

            modalStopBtn.addEventListener('click', stopModalStream);

            modalFavBtn.addEventListener('click', function() {
                if (!currentModalChannel) return;
                const { channel, category } = currentModalChannel;
                toggleFavorite(channel, category);
                this.classList.toggle('active', isFavorite(channel, category));
                renderAll();
            });

            modalPipBtn.addEventListener('click', function() {
                if (!isModalPlaying) {
                    playModalStream();
                    setTimeout(() => {
                        if (document.pictureInPictureElement) {
                            document.exitPictureInPicture();
                        } else if (modalIframe && modalIframe.requestPictureInPicture) {
                            modalIframe.requestPictureInPicture().catch(() => {});
                        }
                    }, 500);
                } else {
                    if (document.pictureInPictureElement) {
                        document.exitPictureInPicture();
                    } else if (modalIframe && modalIframe.requestPictureInPicture) {
                        modalIframe.requestPictureInPicture().catch(() => {});
                    }
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                    closeModal();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                }
                if (e.key === ' ' && modalOverlay.classList.contains('active')) {
                    e.preventDefault();
                    if (isModalPlaying) stopModalStream();
                    else playModalStream();
                }
                if (e.key === 'f' && modalOverlay.classList.contains('active')) {
                    e.preventDefault();
                    modalFavBtn.click();
                }
            });

            // ===== SEARCH =====
            function performSearch(query) {
                const results = [];
                const searchTerm = query.toLowerCase().trim();
                if (!searchTerm) { searchResults.classList.remove('show'); return; }

                Object.keys(currentChannels).forEach(category => {
                    currentChannels[category].forEach((ch, index) => {
                        if (ch.name.toLowerCase().includes(searchTerm)) {
                            results.push({ ...ch, category, index });
                        }
                    });
                });

                if (results.length === 0) {
                    searchResults.innerHTML = `<div style="padding:1rem;color:#666;text-align:center;">No channels found for "${searchTerm}"</div>`;
                    searchResults.classList.add('show');
                    return;
                }

                let html = '';
                results.forEach(result => {
                    html += `
                        <div class="search-result-item" data-category="${result.category}" data-index="${result.index}">
                            <div class="search-result-thumb">
                                ${result.logo ? `<img src="${result.logo}" alt="${result.name}" />` : result.name.charAt(0).toUpperCase()}
                            </div>
                            <div class="search-result-info">
                                <div class="search-result-name">${result.name}</div>
                                <div class="search-result-category">${result.category}</div>
                            </div>
                            <button class="search-result-play">▶ Play</button>
                        </div>
                    `;
                });
                searchResults.innerHTML = html;
                searchResults.classList.add('show');

                searchResults.querySelectorAll('.search-result-item').forEach(item => {
                    const category = item.dataset.category;
                    const index = parseInt(item.dataset.index);
                    item.addEventListener('click', function(e) {
                        if (e.target.closest('.search-result-play')) return;
                        openModal(category, index);
                        searchResults.classList.remove('show');
                        searchInput.value = '';
                    });
                    const playBtn = item.querySelector('.search-result-play');
                    if (playBtn) {
                        playBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            openModal(category, index);
                            searchResults.classList.remove('show');
                            searchInput.value = '';
                        });
                    }
                });
            }

            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => performSearch(this.value), 200);
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-section')) searchResults.classList.remove('show');
            });

            // ===== FAVORITES / HISTORY TOGGLES =====
            favoritesToggle.addEventListener('click', function() {
                showingFavorites = !showingFavorites;
                showingHistory = false;
                this.classList.toggle('active', showingFavorites);
                historyToggle.classList.remove('active');
                clearHistoryBtn.style.display = 'none';
                renderAll();
                if (showingFavorites) {
                    this.textContent = '⭐ Favorites ★';
                } else {
                    this.textContent = '⭐ Favorites';
                }
                this.appendChild(favCount);
            });

            historyToggle.addEventListener('click', function() {
                showingHistory = !showingHistory;
                showingFavorites = false;
                this.classList.toggle('active', showingHistory);
                favoritesToggle.classList.remove('active');
                clearHistoryBtn.style.display = showingHistory ? 'inline-block' : 'none';
                renderAll();
                if (showingHistory) {
                    this.textContent = '🕐 History ★';
                } else {
                    this.textContent = '🕐 History';
                }
            });

            clearHistoryBtn.addEventListener('click', function() {
                if (confirm('Clear all watch history?')) {
                    history = [];
                    localStorage.setItem('icestreams_history', JSON.stringify(history));
                    renderAll();
                    showingHistory = false;
                    historyToggle.classList.remove('active');
                    historyToggle.textContent = '🕐 History';
                    clearHistoryBtn.style.display = 'none';
                }
            });

            // ===== TABS =====
            const tabs = document.querySelectorAll('.tab-btn');
            const panels = {
                all: document.getElementById('panel-all'),
                football: document.getElementById('panel-football'),
                movies: document.getElementById('panel-movies'),
                shows: document.getElementById('panel-shows')
            };

            function activateTab(tabId) {
                tabs.forEach(btn => {
                    const isActive = btn.dataset.tab === tabId;
                    btn.classList.toggle('active', isActive);
                    btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
                });
                Object.keys(panels).forEach(key => {
                    const panel = panels[key];
                    if (key === tabId) {
                        panel.classList.add('active');
                        panel.style.display = 'block';
                    } else {
                        panel.classList.remove('active');
                        panel.style.display = 'none';
                    }
                });
                renderAll();
            }

            tabs.forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabId = this.dataset.tab;
                    if (tabId) activateTab(tabId);
                });
            });

            // ===== INIT =====
            updateFavCount();
            console.log('📺 Icestreams Ultimate is ready!');
            console.log('⭐ All channels restored with Favorites, History, Keyboard shortcuts & PIP');
            console.log('⌨️  Ctrl+K: Search | Space: Play/Pause | F: Favorite | Esc: Close');
        })();
    </script>
</body>
</html>
