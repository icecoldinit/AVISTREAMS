<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICESTREAMS — Live TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 4px;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 40px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: linear-gradient(180deg, #0a0a0a 0%, transparent 100%);
            transition: background 0.3s;
        }

        .navbar.scrolled {
            background: #0a0a0a;
            box-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #e50914;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #fff;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: #e50914;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 25px;
            padding: 6px 16px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .search-box:focus-within {
            background: rgba(255,255,255,0.12);
            border-color: #e50914;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.15);
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 7px 8px;
            outline: none;
            width: 150px;
            font-size: 13px;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box i {
            color: #666;
            font-size: 14px;
            transition: 0.3s;
        }

        .search-box:focus-within i {
            color: #e50914;
        }

        .nav-icons {
            display: flex;
            gap: 18px;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
        }

        .nav-icons i:hover {
            color: #fff;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e50914, #b20710);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .avatar:hover {
            transform: scale(1.1);
        }

        /* ===== HERO ===== */
        .hero {
            height: 70vh;
            background: linear-gradient(77deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 100%),
                        url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=1400&h=500&fit=crop') center/cover;
            display: flex;
            align-items: center;
            padding: 0 40px;
            margin-top: 60px;
            position: relative;
        }

        .hero-content {
            max-width: 550px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(229, 9, 20, 0.9);
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        .hero-badge i {
            font-size: 8px;
            animation: pulse 1.5s infinite;
        }

        .hero h1 {
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.1;
        }

        .hero p {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-play {
            padding: 13px 35px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
            color: #0a0a0a;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.25s;
        }

        .btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255,255,255,0.2);
        }

        .btn-secondary {
            padding: 13px 30px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.08);
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.25s;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            border-color: #fff;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to top, #0a0a0a, transparent);
        }

        /* ===== CATEGORY FILTERS ===== */
        .filters {
            padding: 10px 40px 5px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 7px 18px;
            border: 1px solid #2a2a2a;
            background: transparent;
            color: #999;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
            font-weight: 500;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #e50914;
            color: #fff;
            border-color: #e50914;
        }

        .filter-label {
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 5px;
        }

        /* ===== ROWS ===== */
        .row {
            padding: 15px 40px 10px;
        }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .row h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .row h2 i {
            color: #e50914;
            margin-right: 8px;
        }

        .see-all {
            color: #aaa;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .see-all:hover {
            color: #fff;
        }

        .row-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 15px;
            flex-wrap: nowrap;
        }

        .row-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .row-scroll::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 4px;
        }

        /* ===== CARDS ===== */
        .card {
            min-width: 200px;
            height: 115px;
            border-radius: 8px;
            background: #1a1a1a;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: scale(1.07);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .card .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            opacity: 0;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card:hover .overlay {
            opacity: 1;
        }

        .card .overlay i {
            font-size: 40px;
            color: #fff;
            background: rgba(229, 9, 20, 0.8);
            padding: 12px 16px;
            border-radius: 50%;
            transform: scale(0.8);
            transition: 0.3s;
        }

        .card:hover .overlay i {
            transform: scale(1);
        }

        .card .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #e50914;
            font-size: 9px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .card .title {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        .card .channel-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 34px;
            opacity: 0.25;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            width: 92%;
            max-width: 1000px;
            position: relative;
        }

        .modal-content iframe {
            width: 100%;
            height: 70vh;
            border-radius: 10px;
            border: none;
            background: #000;
        }

        .close-modal {
            position: absolute;
            top: -50px;
            right: 0;
            color: #fff;
            font-size: 34px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
            background: rgba(255,255,255,0.1);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            transform: rotate(90deg);
            background: rgba(255,255,255,0.2);
        }

        .modal-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal-title {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-title .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #e50914;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-actions .btn-share {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .modal-actions .btn-share:hover {
            background: rgba(255,255,255,0.2);
        }

        .modal-actions .btn-fav {
            background: rgba(229, 9, 20, 0.3);
            color: #fff;
        }

        .modal-actions .btn-fav:hover {
            background: rgba(229, 9, 20, 0.6);
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 35px 20px;
            color: #555;
            font-size: 13px;
            border-top: 1px solid #1a1a1a;
            margin-top: 20px;
        }

        footer .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 18px;
        }

        footer .socials a {
            color: #555;
            transition: 0.3s;
        }

        footer .socials a:hover {
            color: #fff;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-content {
            animation: fadeUp 0.8s ease;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 20px;
                flex-wrap: wrap;
                gap: 10px;
            }
            .nav-links {
                display: none;
            }
            .search-box input {
                width: 80px;
            }
            .hero {
                padding: 0 20px;
                height: 55vh;
                margin-top: 70px;
            }
            .hero h1 {
                font-size: 28px;
            }
            .hero p {
                font-size: 13px;
            }
            .row {
                padding: 12px 20px;
            }
            .filters {
                padding: 5px 20px;
                gap: 5px;
            }
            .filter-btn {
                font-size: 11px;
                padding: 5px 12px;
            }
            .card {
                min-width: 150px;
                height: 90px;
            }
            .modal-content {
                width: 96%;
            }
            .modal-content iframe {
                height: 45vh;
            }
            .close-modal {
                top: -40px;
                width: 36px;
                height: 36px;
                font-size: 26px;
            }
            .modal-title {
                font-size: 16px;
            }
            .nav-icons {
                gap: 12px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .search-box input {
                width: 60px;
                font-size: 12px;
            }
            .hero h1 {
                font-size: 22px;
            }
            .btn-play, .btn-secondary {
                padding: 10px 20px;
                font-size: 14px;
            }
            .card {
                min-width: 130px;
                height: 80px;
            }
        }
    </style>
</head>

            },
            // KIDS
            {
                id: 13,
                title: 'Cartoon Network USA',
                embed: 'https://logic.icelanders.st/embed/cartoonnetwork-usa',
                bg: 'https://images.unsplash.com/photo-1608889175123-8ee362201f81?w=400&h=200&fit=crop',
                icon: '🖍️',
                category: 'kids'
            }
        ];

        let currentFilter = 'all';
        let favorites = [];
        let watchHistory = [];

        // ============================================================
        // RENDER FUNCTIONS
        // ============================================================
        function renderChannels(filter = 'all') {
            const container = document.getElementById('channelList');
            let filtered = channels;

            if (filter !== 'all') {
                filtered = channels.filter(c => c.category === filter);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<p style="color:#666; padding:20px;">No channels found in this category</p>';
                return;
            }

            container.innerHTML = filtered.map(channel => `
                <div class="card" style="background-image: url('${channel.bg}');" onclick="openStream('${channel.embed}', '${channel.title}')">
                    <span class="badge">LIVE</span>
                    <span class="channel-icon">${channel.icon}</span>
                    <span class="title">${channel.title}</span>
                    <div class="overlay">
                        <i class="fas fa-play"></i>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // SEARCH
        // ============================================================
        function searchChannels() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const container = document.getElementById('channelList');

            if (!query) {
                renderChannels(currentFilter);
                return;
            }

            const filtered = channels.filter(c => 
                c.title.toLowerCase().includes(query) ||
                c.category.includes(query)
            );

            if (filtered.length === 0) {
                container.innerHTML = '<p style="color:#666; padding:20px;">No channels found for "' + query + '"</p>';
                return;
            }

            container.innerHTML = filtered.map(channel => `
                <div class="card" style="background-image: url('${channel.bg}');" onclick="openStream('${channel.embed}', '${channel.title}')">
                    <span class="badge">LIVE</span>
                    <span class="channel-icon">${channel.icon}</span>
                    <span class="title">${channel.title}</span>
                    <div class="overlay">
                        <i class="fas fa-play"></i>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // FILTER
        // ============================================================
        function filterChannels(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.textContent.trim().toLowerCase().includes(category === 'all' ? 'all' : category)) {
                    btn.classList.add('active');
                }
            });
            renderChannels(category);
            document.getElementById('searchInput').value = '';
        }

        // ============================================================
        // PLAYER
        // ============================================================
        let currentStream = null;

        function openStream(url, title) {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('streamPlayer');
            const titleEl = document.getElementById('modalTitle');

            currentStream = { url, title };
            iframe.src = url;
            titleEl.textContent = title;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeStream() {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('streamPlayer');
            modal.classList.remove('show');
            iframe.src = '';
            document.body.style.overflow = '';
        }

        // ============================================================
        // FAVORITES
        // ============================================================
        function addToFavorites() {
            if (!currentStream) return;
            const channel = channels.find(c => c.title === currentStream.title);
            if (!channel) return;

            if (favorites.includes(channel.id)) {
                favorites = favorites.filter(id => id !== channel.id);
                alert('❤️ Removed from favorites');
            } else {
                favorites.push(channel.id);
                alert('❤️ Added to favorites!');
            }
        }

        // ============================================================
        // SHARE
        // ============================================================
        function shareStream() {
            if (!currentStream) return;
            if (navigator.share) {
                navigator.share({
                    title: currentStream.title,
                    text: 'Watch ' + currentStream.title + ' on ICESTREAMS',
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('🔗 Link copied to clipboard! Share it with friends.');
                }).catch(() => {
                    alert('🔗 Share this link: ' + window.location.href);
                });
            }
        }

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeStream();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // ============================================================
        // CLOSE MODAL ON CLICK OUTSIDE
        // ============================================================
        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) closeStream();
        });

        // ============================================================
        // NAVBAR SCROLL
        // ============================================================
        window.addEventListener('scroll', function() {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        renderChannels('all');

        console.log('🎬 ICESTREAMS');
        console.log('📺 ' + channels.length + ' channels loaded');
        console.log('🔍 Press Ctrl+K to search');
        console.log('❤️ Click heart icon to add to favorites');
    </script>
</body>
</html>
