<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ICE STREAMS — Live TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #2563eb;
            border-radius: 4px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 14px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: #2563eb;
            letter-spacing: -0.5px;
        }
        .logo span { color: #fff; }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid #1a1a1a;
            border-radius: 50px;
            padding: 6px 14px;
            gap: 8px;
            transition: 0.3s;
        }
        .search-box:focus-within {
            border-color: #2563eb;
            background: rgba(255,255,255,0.08);
        }
        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 13px;
            width: 120px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .search-box input::placeholder { color: #555; }
        .search-box i { color: #555; font-size: 13px; }
        .search-box:focus-within i { color: #2563eb; }

        .nav-icons {
            display: flex;
            gap: 14px;
            color: #666;
            font-size: 16px;
        }
        .nav-icons i { cursor: pointer; transition: 0.3s; }
        .nav-icons i:hover { color: #fff; }

        .hero {
            min-height: 55vh;
            display: flex;
            align-items: center;
            padding: 80px 30px 40px;
            background: linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 100%),
                        url('https://i.pinimg.com/1200x/99/86/71/9986714071c634f90d45652c901d6d0f.jpg') center/cover no-repeat;
        }

        .hero-content { max-width: 500px; }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(37,99,235,0.15);
            border: 1px solid rgba(37,99,235,0.3);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .hero-badge i { font-size: 7px; animation: pulse 1.5s infinite; }

        .hero h1 {
            font-size: 38px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 10px;
        }
        .hero h1 .highlight { color: #2563eb; }
        .hero p {
            font-size: 15px;
            color: #999;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .btn-play {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-play:hover {
            background: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(37,99,235,0.3);
        }

        .section { padding: 30px 30px 15px; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .section-header h2 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-header h2 i { color: #2563eb; }
        .section-header .count { color: #555; font-size: 12px; font-weight: 500; }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
        }

        .channel-card {
            background: #141414;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .channel-card:hover {
            border-color: #2563eb;
            background: #1a1a1a;
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .channel-card .logo-wrapper {
            width: 64px;
            height: 64px;
            margin: 0 auto 8px;
            border-radius: 12px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: 0.3s;
            padding: 8px;
        }
        .channel-card:hover .logo-wrapper {
            border-color: #2563eb;
            background: #0a0a0a;
        }
        .channel-card .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .channel-card .name {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.3;
            color: #e0e0e0;
        }
        .channel-card .badge {
            font-size: 9px;
            color: #ef4444;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-top: 4px;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }

        .modal-content {
            width: 92%;
            max-width: 960px;
            position: relative;
        }

        .modal-content iframe {
            width: 100%;
            height: 68vh;
            border-radius: 10px;
            border: none;
            background: #000;
        }

        .close-modal {
            position: absolute;
            top: -44px;
            right: 0;
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.06);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-modal:hover {
            transform: rotate(90deg);
            background: rgba(255,255,255,0.12);
        }

        .modal-title {
            color: #fff;
            margin-top: 12px;
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-title .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* ===== PLAYER FALLBACK ===== */
        .fallback-player {
            display: none;
            background: #0a0a0a;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .fallback-player .message {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .fallback-player .open-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #2563eb;
            color: #fff;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            cursor: pointer;
        }
        .fallback-player .open-btn:hover {
            background: #3b82f6;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: #444;
            font-size: 12px;
            border-top: 1px solid #141414;
            margin-top: 20px;
        }
        footer strong { color: #2563eb; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .channel-card { animation: fadeUp 0.5s ease forwards; }
        .channel-card:nth-child(1) { animation-delay: 0s; }
        .channel-card:nth-child(2) { animation-delay: 0.04s; }
        .channel-card:nth-child(3) { animation-delay: 0.08s; }
        .channel-card:nth-child(4) { animation-delay: 0.12s; }
        .channel-card:nth-child(5) { animation-delay: 0.16s; }
        .channel-card:nth-child(6) { animation-delay: 0.2s; }
        .channel-card:nth-child(7) { animation-delay: 0.24s; }
        .channel-card:nth-child(8) { animation-delay: 0.28s; }
        .channel-card:nth-child(9) { animation-delay: 0.32s; }
        .channel-card:nth-child(10) { animation-delay: 0.36s; }
        .channel-card:nth-child(11) { animation-delay: 0.4s; }
        .channel-card:nth-child(12) { animation-delay: 0.44s; }
        .channel-card:nth-child(13) { animation-delay: 0.48s; }

        @media (max-width: 768px) {
            .navbar { padding: 12px 16px; }
            .logo { font-size: 17px; }
            .search-box input { width: 70px; font-size: 12px; }
            .nav-icons { gap: 10px; font-size: 14px; }
            .hero { padding: 70px 16px 30px; min-height: 45vh; }
            .hero h1 { font-size: 26px; }
            .hero p { font-size: 13px; }
            .section { padding: 20px 16px 10px; }
            .section-header h2 { font-size: 16px; }
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .channel-card { padding: 14px 10px; }
            .channel-card .logo-wrapper { width: 50px; height: 50px; padding: 6px; }
            .channel-card .name { font-size: 11px; }
            .modal-content iframe { height: 40vh; }
            .close-modal { top: -38px; width: 34px; height: 34px; font-size: 20px; }
            .modal-title { font-size: 14px; }
            .btn-play { padding: 10px 24px; font-size: 13px; }
        }

        @media (max-width: 480px) {
            .search-box input { width: 50px; font-size: 11px; }
            .hero h1 { font-size: 20px; }
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
            .channel-card { padding: 10px 6px; }
            .channel-card .logo-wrapper { width: 40px; height: 40px; padding: 4px; }
            .channel-card .name { font-size: 10px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">ICE<span>STREAMS</span></div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search..." id="searchInput" onkeyup="searchChannels()" />
            <span style="font-size:9px;color:#444;font-weight:600;">⌘K</span>
        </div>
        <div class="nav-icons">
            <i class="fas fa-bell" onclick="alert('No new notifications')"></i>
            <i class="fas fa-moon" onclick="toggleTheme()"></i>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge">
                <i class="fas fa-circle"></i> 13 Channels Live
            </div>
            <h1>Watch <span class="highlight">Live TV</span> Anywhere</h1>
            <p>Your favorite sports, entertainment, and kids channels — all in one place.</p>
            <button class="btn-play" onclick="openStream('https://logic.icelanders.st/embed/beinsports-usa', 'beIN SPORTS USA')">
                <i class="fas fa-play"></i> Watch Now
            </button>
        </div>
    </section>

    <section class="section">
        <div class="section-header">
            <h2><i class="fas fa-bolt"></i> Live Channels</h2>
            <span class="count">13 channels</span>
        </div>
        <div class="channel-grid" id="channelGrid"></div>
    </section>

    <!-- ===== MODAL ===== -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeStream()">
                <i class="fas fa-times"></i>
            </span>
            <iframe id="streamPlayer" src="" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
            <div class="modal-title">
                <span class="dot"></span>
                <span id="modalTitle">Now Playing</span>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 <strong>ICESTREAMS</strong> — All rights reserved.
    </footer>

    <script>
        // ============================================================
        // CHANNELS
        // ============================================================
        const channels = [
            { 
                name: 'Sky Sports Premier League', 
                logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/6/67/Sky_Sports_Premier_League_Logo.svg/800px-Sky_Sports_Premier_League_Logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/skysportspremierleague-uk' 
            },
            { 
                name: 'Sky Sports Football', 
                logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/7/77/Sky_Sports_Football_Logo.svg/800px-Sky_Sports_Football_Logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/skysportsfootball-uk' 
            },
            { 
                name: 'Sky Sports F1', 
                logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/4/44/Sky_Sports_F1_Logo.svg/800px-Sky_Sports_F1_Logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/skysportsf1-uk' 
            },
            { 
                name: 'Sky Sports Cricket', 
                logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/b/bc/Sky_Sports_Cricket_Logo.svg/800px-Sky_Sports_Cricket_Logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/skysportscricket-uk' 
            },
            { 
                name: 'Sky Sports Golf', 
                logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/b/b0/Sky_Sports_Golf_Logo.svg/800px-Sky_Sports_Golf_Logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/skysportsgolf-uk' 
            },
            { 
                name: 'Sky Sports Arena', 
                logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/2/23/Sky_Sports_Arena_Logo.svg/800px-Sky_Sports_Arena_Logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/skysportsarena-uk' 
            },
            { 
                name: 'beIN SPORTS USA', 
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/BeIN_Sports_logo.svg/800px-BeIN_Sports_logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/beinsports-usa' 
            },
            { 
                name: 'ESPN USA', 
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/ESPN_logo.svg/800px-ESPN_logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/espn-usa' 
            },
            { 
                name: 'Sony Sports Network IN', 
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/Sony_Sports_Network_logo.svg/800px-Sony_Sports_Network_logo.svg.pn',
                logo: 'https://en.wikipedia.org/wiki/File:Sony_Sports_Network.svg',
                embed: 'https://logic.icelanders.st/embed/sonysportsnetwork-in' 
            },
            { 
                name: 'Willow USA', 
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Willow_Logo.svg/800px-Willow_Logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/willow-usa' 
            },
            { 
                name: 'CBS USA', 
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/CBS.svg/800px-CBS.svg.png',
                embed: 'https://logic.icelanders.st/embed/cbs-usa' 
            },
            { 
                name: 'Disney Channel USA', 
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Disney_Channel_logo_%282014%29.svg/800px-Disney_Channel_logo_%282014%29.svg.png',
                embed: 'https://logic.icelanders.st/embed/disneychannel-usa' 
            },
            { 
                name: 'Cartoon Network USA', 
                logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Cartoon_Network_2010_logo.svg/800px-Cartoon_Network_2010_logo.svg.png',
                embed: 'https://logic.icelanders.st/embed/cartoonnetwork-usa' 
            }
        ];

        // ============================================================
        // RENDER
        // ============================================================
        function renderChannels(filter = '') {
            const grid = document.getElementById('channelGrid');
            let filtered = channels;

            if (filter) {
                filtered = channels.filter(c =>
                    c.name.toLowerCase().includes(filter.toLowerCase())
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px;color:#666;">
                        <i class="fas fa-search" style="font-size:24px;display:block;margin-bottom:10px;"></i>
                        No channels found
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(c => `
                <div class="channel-card" onclick="openStream('${c.embed}', '${c.name}')">
                    <div class="logo-wrapper">
                        <img src="${c.logo}" alt="${c.name}" loading="lazy" 
                             onerror="this.parentElement.innerHTML='<span style=\\'font-size:18px;font-weight:800;color:#2563eb;\\'>${c.name.split(' ').map(w=>w[0]).join('').substring(0,3).toUpperCase()}</span>'" />
                    </div>
                    <span class="name">${c.name}</span>
                    <span class="badge">● Live</span>
                </div>
            `).join('');
        }

        // ============================================================
        // SEARCH
        // ============================================================
        function searchChannels() {
            const query = document.getElementById('searchInput').value.trim();
            renderChannels(query);
        }

        // ============================================================
        // PLAYER - FIXED FOR REDIRECT ISSUES
        // ============================================================
        let currentStream = null;
        let redirectAttempts = 0;

        function openStream(url, title) {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('streamPlayer');
            const titleEl = document.getElementById('modalTitle');

            currentStream = { url, title };
            
            // Try loading the iframe with a sandbox to prevent redirects
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-storage-access-by-user-activation');
            iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture; fullscreen');
            
            // Use the URL directly - the server might need proper referer
            iframe.src = url;
            
            titleEl.textContent = title;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';

            // Watch for redirect attempts
            let checkInterval = setInterval(() => {
                try {
                    // If the iframe redirects to a different domain, this will throw
                    // We'll catch it and show a fallback
                    if (iframe.contentWindow && iframe.contentWindow.location) {
                        const currentUrl = iframe.contentWindow.location.href;
                        if (currentUrl && !currentUrl.includes('icelanders.st') && !currentUrl.includes('about:blank')) {
                            // It redirected! Show fallback
                            clearInterval(checkInterval);
                            showFallbackPlayer(title, url);
                        }
                    }
                } catch (e) {
                    // Cross-origin error means it's working or redirected
                    // Check if it's a redirect
                    if (iframe.src && !iframe.src.includes('icelanders.st') && !iframe.src.includes('about:blank')) {
                        clearInterval(checkInterval);
                        showFallbackPlayer(title, url);
                    }
                }
            }, 2000);

            // Auto-clear interval after 10 seconds
            setTimeout(() => clearInterval(checkInterval), 10000);
        }

        function showFallbackPlayer(title, url) {
            const iframe = document.getElementById('streamPlayer');
            const modal = document.getElementById('videoModal');
            
            // Show fallback message inside the modal
            iframe.style.display = 'none';
            
            // Create fallback if not exists
            let fallback = document.querySelector('.fallback-player');
            if (!fallback) {
                fallback = document.createElement('div');
                fallback.className = 'fallback-player';
                fallback.innerHTML = `
                    <div class="message">
                        <i class="fas fa-exclamation-triangle" style="font-size:24px;display:block;margin-bottom:10px;"></i>
                        The stream is redirecting to an external site.
                    </div>
                    <a class="open-btn" target="_blank" rel="noopener noreferrer">
                        <i class="fas fa-external-link-alt"></i> Open in New Tab
                    </a>
                `;
                modal.querySelector('.modal-content').appendChild(fallback);
            }
            
            fallback.style.display = 'block';
            fallback.querySelector('.open-btn').href = url;
            fallback.querySelector('.open-btn').textContent = '📺 Open ' + title + ' in New Tab';
        }

        function closeStream() {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('streamPlayer');
            const fallback = document.querySelector('.fallback-player');
            
            modal.classList.remove('show');
            iframe.src = '';
            iframe.style.display = 'block';
            if (fallback) fallback.style.display = 'none';
            document.body.style.overflow = '';
        }

        // ============================================================
        // THEME TOGGLE
        // ============================================================
        let theme = 'dark';

        function toggleTheme() {
            const icon = document.querySelector('.nav-icons .fa-moon');
            const isDark = theme === 'dark';

            document.body.style.background = isDark ? '#f5f5f5' : '#0a0a0a';
            document.body.style.color = isDark ? '#1a1a1a' : '#fff';
            document.querySelector('.navbar').style.background = isDark ? 'rgba(245,245,245,0.92)' : 'rgba(10,10,10,0.92)';
            document.querySelector('.navbar').style.borderBottom = isDark ? '1px solid #e0e0e0' : '1px solid #1a1a1a';
            document.querySelector('.logo span').style.color = isDark ? '#1a1a1a' : '#fff';
            document.querySelector('.search-box').style.background = isDark ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.06)';
            document.querySelector('.search-box').style.borderColor = isDark ? '#d0d0d0' : '#1a1a1a';
            document.querySelector('.search-box input').style.color = isDark ? '#1a1a1a' : '#fff';
            document.querySelector('.hero').style.background = isDark 
                ? 'linear-gradient(135deg, rgba(245,245,245,0.95) 0%, rgba(245,245,245,0.7) 100%), url(https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=1400&h=400&fit=crop) center/cover no-repeat'
                : 'linear-gradient(135deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 100%), url(https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=1400&h=400&fit=crop) center/cover no-repeat';
            document.querySelector('.hero p').style.color = isDark ? '#666' : '#999';
            document.querySelectorAll('.channel-card').forEach(el => {
                el.style.background = isDark ? '#fff' : '#141414';
                el.style.borderColor = isDark ? '#e0e0e0' : '#1a1a1a';
            });
            document.querySelectorAll('.channel-card .logo-wrapper').forEach(el => {
                el.style.background = isDark ? '#f5f5f5' : '#0a0a0a';
                el.style.borderColor = isDark ? '#d0d0d0' : '#2a2a2a';
            });
            document.querySelectorAll('.channel-card .name').forEach(el => {
                el.style.color = isDark ? '#1a1a1a' : '#e0e0e0';
            });
            document.querySelectorAll('.channel-card .badge').forEach(el => {
                el.style.color = isDark ? '#dc2626' : '#ef4444';
            });
            document.querySelector('footer').style.color = isDark ? '#888' : '#444';
            document.querySelector('footer').style.borderTopColor = isDark ? '#e0e0e0' : '#141414';
            document.querySelector('.section-header .count').style.color = isDark ? '#888' : '#555';
            document.querySelector('.hero-badge').style.color = isDark ? '#2563eb' : '#60a5fa';
            
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            theme = isDark ? 'light' : 'dark';
        }

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeStream();
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // ============================================================
        // CLOSE MODAL ON CLICK OUTSIDE
        // ============================================================
        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) closeStream();
        });

        // ============================================================
        // INIT
        // ============================================================
        renderChannels();

        console.log('🎬 ICESTREAMS — Fixed Redirect Issues');
        console.log('📺 ' + channels.length + ' channels loaded');
        console.log('🔍 Press Ctrl+K to search');
        console.log('💡 If a stream redirects, click "Open in New Tab"');
    </script>
</body>
</html>
